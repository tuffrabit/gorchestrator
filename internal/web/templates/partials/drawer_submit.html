{{define "partials/drawer_submit.html"}}
<form hx-post="/partials/submit"
  hx-target="#issue-feed"
  hx-swap="afterbegin settle:0s"
  hx-encoding="multipart/form-data"
  enctype="multipart/form-data"
  hx-on::after-request="if(event.detail.successful){ closeDrawer(); }">
  <input type="hidden" name="csrf_token" value="{{.CSRF}}">
  <div class="form-row">
    <label for="project">Project</label>
    <select id="project" name="project" required
      hx-get="/partials/submit/flavors"
      hx-trigger="change"
      hx-target="#agent-flavors"
      hx-include="this"
      hx-swap="innerHTML">
      <option value="" disabled {{if not .SelectedProject}}selected{{end}}>Select a project…</option>
      {{range .Projects}}
      <option value="{{.Name}}" {{if eq $.SelectedProject .Name}}selected{{end}}>{{.Name}}</option>
      {{end}}
    </select>
  </div>
  <div class="form-row">
    <label for="title">Title</label>
    <input id="title" name="title" required placeholder="Add OIDC login" value="{{.Title}}">
  </div>
  <div class="form-row">
    <label for="description">Description <span class="card-meta">(optional)</span></label>
    <textarea id="description" name="description" rows="6"
      placeholder="The meat of the issue: problem, acceptance criteria, constraints…">{{.Description}}</textarea>
  </div>
  <div class="form-row">
    <label for="attachments">Attachments <span class="card-meta">(optional, text files)</span></label>
    <input id="attachments" name="attachments" type="file" multiple
      accept=".txt,.md,.markdown,.html,.htm,.json,.jsonl,.yaml,.yml,.xml,.csv,.tsv,.log,.toml,.ini,.cfg,.conf,.rst,.tex,.diff,.patch,.go,.py,.js,.ts,.tsx,.jsx,.css,.sql,.sh,.bash,.env,.properties">
    <p class="card-meta" style="margin-top:0.35rem">Text-like extensions only (e.g. .md, .txt, .log, .json). Max 20 files, 1&nbsp;MB each.</p>
  </div>
  <div id="agent-flavors">
    {{template "partials/submit_flavors.html" .}}
  </div>
  <div class="form-row form-row-checkbox">
    <label class="checkbox-label"><input type="checkbox" name="dry_run" value="1" {{if .DryRun}}checked{{end}}> Dry run</label>
  </div>
  <button class="btn btn-primary" type="submit">Submit issue</button>
</form>
{{end}}
