storage_root: ~/.config/gorchestrator/storage
db_path: ~/.config/gorchestrator/gorchestrator.db
default_model:
  # Supported providers: openai, gemini, dryrun
  # For OpenAI-compatible local endpoints (llama.cpp/Ollama), use provider: openai
  # and set base_url to the local endpoint.
  provider: openai
  model: gpt-4o-mini
  api_key_env: OPENAI_API_KEY
  # base_url: http://localhost:8080/v1
  timeout: 360s

tools:
  read_file:
    max_bytes: 65536
    max_lines: 2000

# Per-agent configuration. Keys: researcher, planner, implementer.
# Merge: built-in defaults → default_model → agents.<type> → per-issue overrides.
# agents:
#   researcher:
#     adjudicator: self
#     max_attempts: 3
#     loops: 1
#     temperature: 0.2
#     # max_tokens: 8192
#     # system_prompt: "full override..."
#     # system_prompt_append: "extra instructions..."
#     # tools: [read_file, list_directory, grep_search, write_output]
#     # mcp_servers: []
#     # token_budget: 100000   # stored only; enforced in Phase 5
#     model:
#       provider: openai
#       model: o3-mini
#   planner:
#     adjudicator: self
#     max_attempts: 3
#     loops: 1
#   implementer:
#     adjudicator: self
#     max_attempts: 3
#     loops: 1
#     mcp_servers: []          # per-agent MCP server allowlist (deny by default)

# MCP servers (deny by default). Only agents that list a server in mcp_servers see its tools.
# mcp_servers:
#   - name: internal-api
#     command: ["./bin/my-mcp-server"]
#     args: []
#     env: [API_TOKEN]         # host env var NAMES passed through; values not logged

# External adapters are declared explicitly by name + manifest path.
# The core does not scan directories for adapters.
# adapters:
#   - name: s3
#     manifest_path: ~/.config/gorchestrator/adapters/s3.yaml
#   - name: slack
#     manifest_path: ./adapters/slack.yaml
#   - name: email
#     manifest_path: ./adapters/email.yaml

# Long-running daemon (`gorchestrator serve`)
server:
  listen: "127.0.0.1:8080"
  max_concurrent_issues: 2
  shutdown_timeout: 30s
  public_base_url: "http://127.0.0.1:8080"

# Authentication for the dashboard and HTTP API.
# mode: local (dev/test) | oidc (production)
auth:
  mode: local
  local_username: admin
  local_password_env: GORCH_LOCAL_PASSWORD
  # oidc:
  #   issuer_url: "https://accounts.google.com"
  #   client_id: "..."
  #   client_secret_env: GORCH_OIDC_CLIENT_SECRET
  #   scopes: ["openid", "profile", "email"]
  bootstrap_admin_emails:
    - admin@example.com
  session_ttl: 168h

# Notification sinks (console is always on when serve runs).
# List adapter names that implement port: notification.
notifications:
  adapters: []
  # adapters: [slack, email]

# Storage backend: fs (default) or adapter (e.g. S3 via JSON-RPC).
storage:
  backend: fs
  # adapter_name: s3

# External triggers (webhook is built-in; github/jira are adapters).
triggers:
  webhook:
    enabled: false
    token_env: GORCH_WEBHOOK_TOKEN
  adapters: []
  # adapters: [github, jira]
  trust_external: false   # external issues force human implementer gate

